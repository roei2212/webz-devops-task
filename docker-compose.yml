version: '3.8'

services:
  webz-001:
    build: ./cluster
    container_name: webz-001
    privileged: true
    networks:
      - webz-net

  webz-002:
    build: ./cluster
    container_name: webz-002
    privileged: true
    networks:
      - webz-net

  webz-003:
    build: ./cluster
    container_name: webz-003
    privileged: true
    networks:
      - webz-net

  webz-004:
    build: ./jenkins
    container_name: webz-004
    privileged: true
    user: root
    ports:
      - "8080:8080"
    networks:
      - webz-net
    volumes:
      - ./jenkins/home:/var/jenkins_home
      - ./jenkins/logs:/logs
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  webz-net:
    driver: bridge
